[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    unit: Unit tests
    integration: Integration tests
    e2e: End-to-end tests
    edge: Edge case tests
    slow: Slow tests
    unsupported: Tests for unsupported syntax cases

# 默认忽略的目录
norecursedirs = 
    .git
    __pycache__
    archive
    docs
    .pytest_cache
